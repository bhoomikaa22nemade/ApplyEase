<!DOCTYPE html>
<html>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>Register</title>
    <link rel='stylesheet' href='register.css'>
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>
    <div class='container'>
        <div class="left">

    <div class="logo-circle">

        <i class="fa-solid fa-briefcase"></i>

    </div>

    <h1>ApplyEase</h1>

    <p class="welcome-text">

        <em>
            Register your account, log in securely,
            and explore smarter job applications with ApplyEase.
        </em>

    </p>

</div>
        <div class='right'>
            <form id='registerForm'>
                <h2>Create Account</h2><input id='name' placeholder='Full Name' required><input id='email' type='email'
                    placeholder='Email' required><input id='phone' placeholder='Phone Number' required><select
                    id='experience'>
                    <option>Experience</option>
                    <option>Fresher</option>
                    <option>0-1 Years</option>
                    <option>1-3 Years</option>
                    <option>3-5 Years</option>
                    <option>5+ Years</option>
                </select><input id='password' type='password' placeholder='Password' required><input
                    id='confirmPassword' type='password' placeholder='Confirm Password' required><button
                    type='submit'>Register</button>
                <p>Already have an account? <a href='index.html'>Login</a></p>
            </form>
        </div>
    </div>
    <script src='register.js'></script>
</body>

</html>
